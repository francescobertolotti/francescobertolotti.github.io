<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <rect width="900" height="280" fill="#f6fbf6" />
  <g font-family="Georgia, serif" font-size="24" fill="#213429">
    <rect x="40" y="110" width="140" height="80" rx="6" fill="#ffffff" stroke="#9fbea4" stroke-width="2" />
    <text x="110" y="158" text-anchor="middle">Source</text>

    <rect x="220" y="110" width="150" height="80" rx="6" fill="#ffffff" stroke="#9fbea4" stroke-width="2" />
    <text x="295" y="158" text-anchor="middle">Encoder</text>

    <rect x="410" y="104" width="190" height="92" rx="6" fill="#d8eddc" stroke="#4f8d5d" stroke-width="3.5" />
    <text x="505" y="146" text-anchor="middle">Channel</text>
    <text x="505" y="174" text-anchor="middle">+ noise</text>

    <rect x="640" y="110" width="150" height="80" rx="6" fill="#ffffff" stroke="#9fbea4" stroke-width="2" />
    <text x="715" y="158" text-anchor="middle">Decoder</text>

    <rect x="820" y="110" width="70" height="80" rx="6" fill="#ffffff" stroke="#9fbea4" stroke-width="2" />
