  </g>
  <g stroke="#486d50" stroke-width="3.5" fill="none">
    <line x1="180" y1="150" x2="220" y2="150" />
    <line x1="370" y1="150" x2="410" y2="150" />
    <line x1="600" y1="150" x2="640" y2="150" />
    <line x1="790" y1="150" x2="820" y2="150" />
  </g>
  <g fill="#486d50">
    <polygon points="220,150 208,144 208,156" />
    <polygon points="410,150 398,144 398,156" />
    <polygon points="640,150 628,144 628,156" />
    <polygon points="820,150 808,144 808,156" />
  </g>
  <g font-family="Georgia, serif" font-size="19" fill="#35543c">
    <text x="505" y="64" text-anchor="middle">Step 3: focus on uncertainty introduced by noise</text>
